<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Shadow -->
  <ellipse cx="100" cy="178" rx="52" ry="8" fill="#000" fill-opacity="0.10"/>
  <!-- Main gear body -->
  <circle cx="100" cy="95" r="34" fill="url(#g1)"/>
  <circle cx="100" cy="95" r="18" fill="url(#g2)"/>
  <circle cx="100" cy="95" r="7" fill="#2a2a2a"/>
  <!-- Gear teeth -->
  <rect x="93" y="54" width="14" height="12" rx="3" fill="url(#g1)" transform="rotate(0 100 95)"/>
  <rect x="93" y="54" width="14" height="12" rx="3" fill="url(#g1)" transform="rotate(45 100 95)"/>
  <rect x="93" y="54" width="14" height="12" rx="3" fill="url(#g1)" transform="rotate(90 100 95)"/>
  <rect x="93" y="54" width="14" height="12" rx="3" fill="url(#g1)" transform="rotate(135 100 95)"/>
  <rect x="93" y="54" width="14" height="12" rx="3" fill="url(#g1)" transform="rotate(180 100 95)"/>
  <rect x="93" y="54" width="14" height="12" rx="3" fill="url(#g1)" transform="rotate(225 100 95)"/>
  <rect x="93" y="54" width="14" height="12" rx="3" fill="url(#g1)" transform="rotate(270 100 95)"/>
  <rect x="93" y="54" width="14" height="12" rx="3" fill="url(#g1)" transform="rotate(315 100 95)"/>
  <!-- Small gear -->
  <circle cx="152" cy="58" r="18" fill="url(#g3)"/>
  <circle cx="152" cy="58" r="9" fill="url(#g2)"/>
  <circle cx="152" cy="58" r="3.5" fill="#2a2a2a"/>
  <rect x="147" y="33" width="10" height="8" rx="2" fill="url(#g3)" transform="rotate(0 152 58)"/>
  <rect x="147" y="33" width="10" height="8" rx="2" fill="url(#g3)" transform="rotate(60 152 58)"/>
  <rect x="147" y="33" width="10" height="8" rx="2" fill="url(#g3)" transform="rotate(120 152 58)"/>
  <rect x="147" y="33" width="10" height="8" rx="2" fill="url(#g3)" transform="rotate(180 152 58)"/>
  <rect x="147" y="33" width="10" height="8" rx="2" fill="url(#g3)" transform="rotate(240 152 58)"/>
  <rect x="147" y="33" width="10" height="8" rx="2" fill="url(#g3)" transform="rotate(300 152 58)"/>
  <!-- Connecting rod -->
  <rect x="128" y="71" width="26" height="6" rx="3" fill="#9ca3af" fill-opacity="0.7" transform="rotate(-35 128 71)"/>
  <!-- Floating particles -->
  <circle cx="55" cy="48" r="4" fill="#9ca3af" fill-opacity="0.5"/>
  <circle cx="42" cy="130" r="3" fill="#6b7280" fill-opacity="0.4"/>
  <circle cx="162" cy="130" r="5" fill="#d1d5db" fill-opacity="0.4"/>
  <circle cx="75" cy="160" r="3" fill="#9ca3af" fill-opacity="0.5"/>
  <defs>
    <linearGradient id="g1" x1="70" y1="60" x2="130" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3f3f46"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="g2" x1="85" y1="78" x2="115" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#71717a"/>
      <stop offset="1" stop-color="#3f3f46"/>
    </linearGradient>
    <linearGradient id="g3" x1="136" y1="42" x2="168" y2="74" gradientUnits="userSpaceOnUse">
      <stop stop-color="#52525b"/>
      <stop offset="1" stop-color="#27272a"/>
    </linearGradient>
  </defs>
